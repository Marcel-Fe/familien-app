<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Outro</title>
<style>
  :root { --berry:#C8628A; --coral:#FF7B6B; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body {
    width:1080px; height:1920px; overflow:hidden;
    font-family:"Nunito",-apple-system,"Segoe UI",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .outro {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.22) 0%, transparent 50%),
      linear-gradient(135deg, var(--berry) 0%, var(--coral) 60%, #FF9466 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:54px;
  }
  .logo {
    width:300px; height:300px; background:white; border-radius:68px;
    display:flex; align-items:center; justify-content:center;
    font-size:170px; box-shadow:0 24px 70px rgba(0,0,0,0.3);
  }
  .title {
    font-size:140px; font-weight:900; color:white; text-align:center;
    letter-spacing:-0.03em; line-height:1; text-shadow:0 6px 0 rgba(0,0,0,0.08);
  }
  .sub {
    font-size:56px; font-weight:600; color:rgba(255,255,255,0.97);
    text-align:center; line-height:1.2; padding:0 60px;
  }
  .cta {
    margin-top:36px; padding:40px 84px; background:white; color:var(--berry);
    font-size:66px; font-weight:900; border-radius:100px;
    box-shadow:0 14px 40px rgba(0,0,0,0.25); letter-spacing:-0.01em;
  }
</style>
</head>
<body>
<div class="outro">
  <div class="logo">👨‍👩‍👧‍👦</div>
  <div class="title">FamilienApp</div>
  <div class="sub">Alles für deine Familie.<br>In einer App.</div>
  <div class="cta">Jetzt kostenlos laden</div>
</div>
</body>
</html>
