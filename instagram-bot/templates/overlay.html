<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Overlay</title>
<style>
  :root {
    --berry: #C8628A;
    --coral: #FF7B6B;
    --butter: #F4D27A;
    --deep: #2A3C50;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px; height: 1920px;
    overflow: hidden;
    background: transparent;
    font-family: "Nunito", -apple-system, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .stage { position: relative; width: 1080px; height: 1920px; }

  /* Bottom gradient for subtitle legibility */
  .grad {
    position: absolute; left: 0; right: 0; bottom: 0; height: 620px;
    background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 70%, rgba(0,0,0,0.78) 100%);
  }
  .grad-top {
    position: absolute; left: 0; right: 0; top: 0; height: 360px;
    background: linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0) 100%);
  }

  /* Badge */
  .badge {
    position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
    padding: 22px 46px; background: white; border-radius: 100px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    display: flex; align-items: center; gap: 16px;
  }
  .badge-dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: linear-gradient(135deg, var(--berry), var(--coral));
  }
  .badge-text { font-size: 36px; font-weight: 900; color: var(--deep); letter-spacing: -0.01em; }

  /* Speaker label */
  .speaker {
    position: absolute; top: 180px; left: 60px;
    padding: 16px 32px 16px 24px;
    background: rgba(20,28,40,0.82);
    border-radius: 60px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.4);
  }
  .speaker-dot {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--coral); box-shadow: 0 0 16px currentColor;
  }
  .speaker-name { font-size: 34px; font-weight: 800; color: white; }

  /* Subtitle */
  .subtitle {
    position: absolute; bottom: 130px; left: 60px; right: 60px;
    padding: 38px 50px;
    background: rgba(20,28,40,0.9);
    border-radius: 32px;
    color: white; font-size: 56px; font-weight: 800;
    line-height: 1.24; text-align: center; letter-spacing: -0.01em;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="grad-top"></div>
  <div class="grad"></div>
  <div class="badge"><div class="badge-dot"></div><div class="badge-text">FamilienApp Tipp</div></div>
  <div class="speaker" id="speaker">
    <div class="speaker-dot" id="speaker-dot"></div>
    <div class="speaker-name" id="speaker-name">Mama</div>
  </div>
  <div class="subtitle" id="subtitle">Untertitel</div>
</div>
<script>
  window.__setOverlay = function(o) {
    const sp = document.getElementById('speaker');
    if (o.label) {
      document.getElementById('speaker-name').textContent = o.label;
      document.getElementById('speaker-dot').style.background = o.color || '#FF7B6B';
      sp.style.display = 'flex';
    } else {
      sp.style.display = 'none';
    }
    document.getElementById('subtitle').textContent = o.subtitle || '';
  };
</script>
</body>
</html>
