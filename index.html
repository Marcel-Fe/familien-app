<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FamilienApp — Für die ganze Familie</title>
  <meta name="description" content="App für die ganze Familie: Zuschüsse, Anträge, Wohnungssuche, Umgebung, Rezepte, Gesundheit, Kalender und Spar-Tipps." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4F46E5" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS / Apple -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FamilienApp" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png" />
  <link rel="apple-touch-icon" sizes="128x128" href="icons/icon-128.png" />

  <!-- Splash Screens iOS -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/styles.css?v=11" />
</head>
<body>

  <!-- ===== Splash-Screen mit echtem Familienfoto ===== -->
  <div id="splash" class="splash-overlay">
    <div class="splash-foto-bg"></div>
    <div class="splash-foto-overlay"></div>

    <div class="splash-content">
      <div class="splash-logo-wrap">
        <svg class="splash-logo-svg" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="sLg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#A78BFA"/>
              <stop offset="100%" stop-color="#F9A8D4"/>
            </linearGradient>
          </defs>
          <path d="M30 8 L6 27 L10 27 L10 52 L50 52 L50 27 L54 27 Z" fill="url(#sLg)" rx="3"/>
          <path d="M30 36 C30 36 24 30 24 26.5 C24 23.5 27 21.5 30 24 C33 21.5 36 23.5 36 26.5 C36 30 30 36 30 36Z" fill="white" opacity=".95"/>
          <circle cx="23" cy="44" r="3.5" fill="white" opacity=".8"/>
          <circle cx="30" cy="44" r="3.5" fill="white" opacity=".8"/>
          <circle cx="37" cy="44" r="3.5" fill="white" opacity=".8"/>
        </svg>
      </div>
      <h1 class="splash-titel">FamilienApp</h1>
      <p class="splash-sub">Für die ganze Familie — Alltag, Hilfe &amp; Organisation</p>
      <div class="splash-pulse">
        <span></span><span></span><span></span>
      </div>
      <button class="splash-skip" onclick="splashSchliessen()">App starten →</button>
    </div>
  </div>

  <!-- ===== Registrierungs-Overlay (wird per JS gesteuert) ===== -->
  <div id="reg-overlay" class="reg-overlay versteckt" role="dialog" aria-modal="true" aria-label="Registrierung">
    <div class="reg-box">
      <div class="reg-logo">🏠 FamilienApp</div>
      <div id="reg-inhalt"><!-- wird per JS gefüllt --></div>
    </div>
  </div>

  <!-- ===== App (nach Registrierung sichtbar) ===== -->
  <div id="app" class="versteckt">

    <!-- Header -->
    <header class="header" id="header">
      <div class="header-top">
        <div class="logo" onclick="zuSektion('dashboard')" style="cursor:pointer">
          <svg class="logo-icon" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <linearGradient id="logoG" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#A78BFA"/>
                <stop offset="100%" stop-color="#F9A8D4"/>
              </linearGradient>
            </defs>
            <path d="M22 5 L4 19.5 L7.5 19.5 L7.5 39 L36.5 39 L36.5 19.5 L40 19.5 Z" fill="url(#logoG)"/>
            <path d="M22 27 C22 27 17 21.5 17 18.5 C17 16 19.5 14.3 22 16.5 C24.5 14.3 27 16 27 18.5 C27 21.5 22 27 22 27Z" fill="white" opacity=".95"/>
            <circle cx="17" cy="33" r="2.8" fill="white" opacity=".8"/>
            <circle cx="22" cy="33" r="2.8" fill="white" opacity=".8"/>
            <circle cx="27" cy="33" r="2.8" fill="white" opacity=".8"/>
          </svg>
          <span class="logo-text">FamilienApp</span>
        </div>
        <div class="header-rechts">
          <div class="bundesland-wrapper">
            <label for="bl-select">📍</label>
            <select id="bl-select"><option value="">Bundesland</option></select>
          </div>
          <button class="suche-icon-btn" onclick="zuSektion('suche')" title="Suchen">🔍</button>
          <button class="profil-btn" id="profil-btn" onclick="profilOeffnen()" title="Mein Profil">
            <span id="profil-avatar">?</span>
          </button>
        </div>
      </div>
      <!-- Haupt-Gruppen -->
      <nav class="nav-gruppen" id="nav-gruppen" role="navigation" aria-label="Hauptkategorien">
        <button class="nav-g-btn" data-gruppe="start"     onclick="navGruppeWaehlen('start')">Start</button>
        <button class="nav-g-btn" data-gruppe="geld"      onclick="navGruppeWaehlen('geld')">Geld</button>
        <button class="nav-g-btn" data-gruppe="formulare" onclick="navGruppeWaehlen('formulare')">Formulare</button>
        <button class="nav-g-btn" data-gruppe="ort"       onclick="navGruppeWaehlen('ort')">Orte</button>
        <button class="nav-g-btn" data-gruppe="familie"   onclick="navGruppeWaehlen('familie')">Familie</button>
        <button class="nav-g-btn" data-gruppe="kinder"    onclick="navGruppeWaehlen('kinder')">Kinder</button>
        <button class="nav-g-btn" data-gruppe="gesund"    onclick="navGruppeWaehlen('gesund')">Gesund</button>
        <button class="nav-g-btn" data-gruppe="mehr"      onclick="navGruppeWaehlen('mehr')">Mehr</button>
      </nav>
      <!-- Unter-Tabs (erscheinen nach Klick auf Gruppe) -->
      <nav class="nav-sub" id="nav-sub" role="navigation" aria-label="Unternavigation"></nav>
    </header>

    <!-- Hauptinhalt -->
    <main class="main" id="content" role="main" aria-live="polite"></main>

    <!-- Footer -->
    <footer class="footer">
      <p>🏠 FamilienApp · Alle Angaben ohne Gewähr · Daten bleiben auf Ihrem Gerät</p>
    </footer>

  </div><!-- /#app -->

  <!-- Bottom Navigation für moderne Mobile-UX -->
  <nav class="bottom-nav" id="bottom-nav" role="navigation" aria-label="Hauptnavigation Mobile">
    <button class="bottom-nav-btn" onclick="zuSektion('dashboard')" data-bn="dashboard">
      <span class="bottom-nav-icon">🏠</span><span class="bottom-nav-label">Start</span>
    </button>
    <button class="bottom-nav-btn" onclick="zuSektion('kalender')" data-bn="kalender">
      <span class="bottom-nav-icon">📅</span><span class="bottom-nav-label">Kalender</span>
    </button>
    <button class="bottom-nav-btn" onclick="zuSektion('familie')" data-bn="familie">
      <span class="bottom-nav-icon">👨‍👩‍👧</span><span class="bottom-nav-label">Familie</span>
    </button>
    <button class="bottom-nav-btn" onclick="zuSektion('gesundheit')" data-bn="gesundheit">
      <span class="bottom-nav-icon">🌿</span><span class="bottom-nav-label">Gesund</span>
    </button>
    <button class="bottom-nav-btn" onclick="zuSektion('suche')" data-bn="suche">
      <span class="bottom-nav-icon">🔍</span><span class="bottom-nav-label">Suche</span>
    </button>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/data.js?v=10"></script>
  <script src="js/app.js?v=10"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          reg.update();
          // Bei neuer SW-Version: alte Caches löschen, neu laden
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'activated') {
                caches.keys().then(keys => Promise.all(
                  keys.filter(k => !k.includes('familienapp-v10')).map(k => caches.delete(k))
                )).then(() => location.reload());
              }
            });
          });
        }).catch(() => {});
      });
    }
  </script>
</body>
</html>
